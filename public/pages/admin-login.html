<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login — VoteSecure</title>
  <link rel="stylesheet" href="/css/style.css"/>

  <!--
    SECURITY: no-store prevents browser caching this page.
    Admin login page must never be served from cache after logout.
  -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>

  <style>
    /* ── Lock box shown when account is locked out ── */
    .lock-box{
      background:#fef2f2;border:2px solid #fca5a5;border-radius:14px;
      padding:20px;text-align:center;margin-bottom:14px;
    }
    /* ── Attempt dots — turns red on each failed attempt ── */
    .attempt-dots{display:flex;gap:8px;justify-content:center;margin:10px 0 6px;}
    .attempt-dot{
      width:14px;height:14px;border-radius:50%;
      background:#e2e8f0;transition:background .25s;
    }
    .attempt-dot.used{background:#ef4444;}
    .lock-count{font-size:12px;color:#9ca3af;text-align:center;}

    /* ── IP mismatch warning ── */
    .ip-warn{
      background:#fef9c3;border:1px solid #fde047;border-radius:10px;
      padding:12px 14px;font-size:12px;color:#92400e;margin-bottom:14px;
    }
  </style>
</head>
<body>
<div class="auth-page" style="background:linear-gradient(135deg,#0f172a,#1e293b);">
  <div class="auth-card" style="max-width:420px;">

    <div class="auth-header">
      <span class="icon">🔐</span>
      <h1>Admin Login</h1>
      <p>Authorized administrators only</p>
    </div>

    <!-- Security notice (visible always — not a hint, a warning to intruders) -->
    <div style="background:#1e293b;border:1px solid rgba(255,255,255,.12);border-radius:10px;
                padding:11px 14px;margin-bottom:16px;font-size:12px;color:#94a3b8;line-height:1.5;">
      🔒 <strong style="color:#e2e8f0;">Protected:</strong>
      5 failed attempts = 15-min lockout. All login attempts are logged with IP &amp; timestamp.
    </div>

    <!-- Dynamic alerts (auth required / expired / ip mismatch) -->
    <div id="alert"></div>

    <div id="loginForm">

      <!-- Attempt indicator — hidden until first failure -->
      <div id="attemptWrap" style="display:none;margin-bottom:12px;">
        <div class="attempt-dots">
          <div class="attempt-dot" id="dot0"></div>
          <div class="attempt-dot" id="dot1"></div>
          <div class="attempt-dot" id="dot2"></div>
          <div class="attempt-dot" id="dot3"></div>
          <div class="attempt-dot" id="dot4"></div>
        </div>
        <div class="lock-count" id="attemptTxt"></div>
      </div>

      <div class="form-group">
        <label class="form-label">USERNAME</label>
        <input type="text" id="username" class="form-control"
               placeholder="Enter username"
               autocomplete="username" autocorrect="off" autocapitalize="none" spellcheck="false"/>
      </div>

      <div class="form-group">
        <label class="form-label">PASSWORD</label>
        <input type="password" id="password" class="form-control"
               placeholder="Enter password"
               autocomplete="current-password"/>
      </div>

      <button class="btn btn-primary btn-block btn-lg" id="loginBtn" onclick="doLogin()">
        Login to Admin Panel
      </button>
    </div>

    <div style="text-align:center;margin-top:18px;">
      <a href="/" style="font-size:13px;color:var(--muted);">← Back to Home</a>
    </div>
  </div>
</div>

<script>
'use strict';
var failCount = 0;

// ── Show appropriate alert based on URL query param ──────────────
(function showRedirectReason(){
  var q = location.search;
  var alertEl = document.getElementById('alert');
  if(q.includes('auth=required')){
    alertEl.innerHTML = '<div class="alert alert-warning">⚠️ Admin login required to access that page.</div>';
  } else if(q.includes('reason=expired') || q.includes('session=expired')){
    alertEl.innerHTML = '<div class="alert alert-warning">⏱️ Your session expired. Please log in again.</div>';
  } else if(q.includes('reason=ip_mismatch')){
    alertEl.innerHTML =
      '<div class="ip-warn">🚨 <strong>Security alert:</strong> Your session was ended because your IP address changed. '
      + 'This protects against session hijacking. Please log in again.</div>';
  } else if(q.includes('reason=timeout')){
    alertEl.innerHTML = '<div class="alert alert-warning">⏱️ Logged out due to 2 hours inactivity.</div>';
  }
})();

// ── If already authenticated, go straight to dashboard ───────────
// NOTE: server returns the real hidden route in data.admin — we stored
// it in sessionStorage at login time. If not stored, use /api/admin/me
// to check and then server.js will redirect via ADMIN_ROUTE.
(async function checkAlreadyLoggedIn(){
  try{
    var r    = await fetch('/api/admin/me');
    var data = await r.json();
    if(data.admin){
      // Already logged in — go to stored hidden route or fallback
      var stored = sessionStorage.getItem('__vsAdminRoute');
      window.location.replace(stored || '/secure-admin-panel');
    }
  }catch(e){ /* not logged in — stay on this page */ }
})();

// ── Update attempt dots ──────────────────────────────────────────
function markFail(){
  failCount++;
  document.getElementById('attemptWrap').style.display = 'block';
  for(var i = 0; i < 5; i++){
    var d = document.getElementById('dot'+i);
    if(d) d.className = 'attempt-dot' + (i < failCount ? ' used' : '');
  }
  var rem = 5 - failCount;
  document.getElementById('attemptTxt').textContent = rem > 0
    ? '⚠️ ' + rem + ' attempt' + (rem === 1 ? '' : 's') + ' remaining before 15-minute lockout'
    : '🔒 Locked out. Wait 15 minutes before trying again.';
}

// ── Main login handler ───────────────────────────────────────────
async function doLogin(){
  var uname = document.getElementById('username').value.trim();
  var pwd   = document.getElementById('password').value;
  var alertEl = document.getElementById('alert');
  var btn   = document.getElementById('loginBtn');

  if(!uname || !pwd){
    alertEl.innerHTML = '<div class="alert alert-danger">Username and password are required.</div>';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Verifying…';
  alertEl.innerHTML = '';

  try{
    var res  = await fetch('/api/admin/login', {
      method:  'POST',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify({username: uname, password: pwd})
    });
    var data = await res.json();

    if(!res.ok) throw new Error(data.error || 'Login failed.');

    // ── REQUIREMENT 7: Server returns the real hidden route ───────
    // Store it in sessionStorage so future page loads know where to go.
    // sessionStorage is cleared automatically when the tab closes.
    if(data.redirect){
      sessionStorage.setItem('__vsAdminRoute', data.redirect);
    }

    // Redirect to the hidden admin route (NOT /admin — that returns 404)
    window.location.replace(data.redirect || '/secure-admin-panel');

  }catch(e){
    var msg = e.message || 'Login failed.';
    var isLocked = /lock|wait|attempt/i.test(msg);

    if(isLocked){
      // Full lockout — show lock box, disable button permanently
      alertEl.innerHTML =
        '<div class="lock-box">'
        + '<div style="font-size:2.5rem;">🔒</div>'
        + '<div style="font-weight:800;color:#b91c1c;font-size:15px;margin-top:10px;">Account Locked</div>'
        + '<div style="font-size:13px;color:#64748b;margin-top:6px;">' + msg + '</div>'
        + '</div>';
      btn.disabled = true;
      btn.innerHTML = '🔒 Locked';
    } else {
      markFail();
      alertEl.innerHTML = '<div class="alert alert-danger">❌ ' + msg + '</div>';
      btn.disabled = false;
      btn.innerHTML = 'Login to Admin Panel';
    }
  }
}

// Allow Enter key to submit
document.addEventListener('keydown', function(e){
  if(e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
